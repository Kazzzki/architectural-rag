<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio - Sticker Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #121212;
            color: #f3f4f6;
            font-family: 'Fredoka', sans-serif;
        }

        .glass {
            background: rgba(40, 40, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            position: relative;
        }

        .bubble-user {
            background: #ec4899;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bubble-ai {
            background: #374151;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
    </style>
</head>

<body class="h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/10 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🎨</span>
            <h1 class="text-xl font-bold bg-gradient-to-r from-pink-400 to-purple-400 bg-clip-text text-transparent">
                Sticker Studio</h1>
        </div>
        <div class="flex gap-4">
            <a href="/gallery" class="text-gray-400 hover:text-white">Gallery</a>
            <a href="/generate" class="text-pink-400 font-bold">Studio</a>
        </div>
    </nav>

    <!-- Main Chat Area -->
    <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-4" id="chat-container">
        <!-- AI Welcome -->
        <div class="flex flex-col gap-1 items-start">
            <div class="flex items-center gap-2 text-xs text-gray-400 ml-2">
                <span>AI Artist</span>
            </div>
            <div class="chat-bubble bubble-ai">
                どんなスタンプを作りますか？<br>
                「おはよう」や「煽り顔」など、自由に話しかけてください！🐱
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 shrink-0">
        <div class="glass rounded-full p-2 flex items-center gap-2 max-w-2xl mx-auto">
            <input type="text" id="user-input" placeholder="例: お仕事お疲れ様！"
                class="flex-1 bg-transparent border-none focus:ring-0 text-white px-4 py-2 placeholder-gray-500">
            <button id="send-btn" class="bg-pink-500 hover:bg-pink-600 text-white p-3 rounded-full transition">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col gap-1 items-${isUser ? 'end' : 'start'}`;

            if (!isUser) {
                const name = document.createElement('div');
                name.className = "flex items-center gap-2 text-xs text-gray-400 ml-2 mb-1";
                name.innerText = "AI Artist";
                wrapper.appendChild(name);
            }

            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${isUser ? 'bubble-user' : 'bubble-ai'}`;
            bubble.innerText = text;
            wrapper.appendChild(bubble);

            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendImage(url, prompt) {
            const wrapper = document.createElement('div');
            wrapper.className = "flex flex-col gap-1 items-start";

            const bubble = document.createElement('div');
            bubble.className = "chat-bubble bubble-ai p-2";

            const img = document.createElement('img');
            img.src = url;
            img.className = "rounded-xl max-w-xs w-full mb-2 bg-white"; // Sticker usually needs light bg to see transparency

            const dlLink = document.createElement('a');
            dlLink.href = url;
            dlLink.download = "sticker.png";
            dlLink.className = "text-xs text-pink-300 hover:underline block text-center";
            dlLink.innerText = "Download PNG";

            bubble.appendChild(img);
            bubble.appendChild(dlLink);
            wrapper.appendChild(bubble);

            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            appendMessage(text, true);

            // 1. Loading
            const loadingId = 'loading-' + Date.now();
            const loadingWrapper = document.createElement('div');
            loadingWrapper.id = loadingId;
            loadingWrapper.className = "flex flex-col gap-1 items-start";
            loadingWrapper.innerHTML = `<div class="chat-bubble bubble-ai text-gray-400">Thinking... 🎨</div>`;
            chatContainer.appendChild(loadingWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // 2. Analyze Text
                const analyzeRes = await fetch('/api/analyze_text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const analyzeData = await analyzeRes.json();

                if (analyzeData.error) throw new Error(analyzeData.error);

                // Update Loading
                document.getElementById(loadingId).querySelector('.bubble-ai').innerText = `Drawing "${analyzeData.sticker_caption}"... 🖌️`;

                // 3. Generate Sticker
                const genRes = await fetch('/api/generate_sticker', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        best_image_id: analyzeData.best_image_id,
                        sticker_caption: analyzeData.sticker_caption,
                        theme: analyzeData.theme || text
                    })
                });
                const genData = await genRes.json();

                // Remove loading
                document.getElementById(loadingId).remove();

                if (genData.status === 'success') {
                    appendImage(genData.url, genData.prompt);
                } else {
                    appendMessage("Error generating image: " + genData.error, false);
                }

            } catch (e) {
                document.getElementById(loadingId).remove();
                console.error(e);
                appendMessage("Sorry, I encountered an error: " + e.message, false);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>

</html>
