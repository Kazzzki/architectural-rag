<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sticker Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f3f4f6;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center">
    <div class="glass p-8 w-full max-w-sm text-center">
        <h1 class="text-2xl font-bold mb-6 text-pink-400">🐱 Sticker Maker</h1>
        {% if error %}
        <p class="text-red-400 mb-4">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password"
                class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-pink-500">
            <button type="submit"
                class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-4 rounded transition">
                Enter Studio
            </button>
        </form>
    </div>
</body>

</html>
